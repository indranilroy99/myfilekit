    <path d="M92 47h82l34 34v104H92z" fill="url(#paper)" stroke="#101828" stroke-opacity=".18" stroke-width="4" stroke-linejoin="round"/>
    <path d="M174 47v34h34z" fill="#d5e1ee"/>
    <path d="M47 104h63l16 18h83v18H47z" fill="#0b6ea8" stroke="#fff" stroke-opacity=".18" stroke-width="4" stroke-linejoin="round"/>
    <path d="M43 122h170l-13 76H56z" fill="url(#folder)" stroke="#fff" stroke-opacity=".18" stroke-width="4" stroke-linejoin="round"/>
    <path d="M54 134h148" fill="none" stroke="#fff" stroke-opacity=".42" stroke-width="7" stroke-linecap="round"/>
    <path d="M85 159l27 27 64-72" fill="none" stroke="#fff" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M116 91h50M116 115h62M116 139h36" fill="none" stroke="#101828" stroke-opacity=".28" stroke-width="8" stroke-linecap="round"/>
    <circle cx="188" cy="180" r="11" fill="url(#accent)"/>
