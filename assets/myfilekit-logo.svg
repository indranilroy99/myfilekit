<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">MyFileKit logo</title>
  <desc id="desc">A premium file toolkit mark with a folder, document, and check symbol.</desc>
  <defs>
    <linearGradient id="tile" x1="30" y1="24" x2="226" y2="232" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101828"/>
      <stop offset="1" stop-color="#29384f"/>
    </linearGradient>
    <linearGradient id="folder" x1="42" y1="107" x2="213" y2="197" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f7fbd"/>
      <stop offset="1" stop-color="#075f99"/>
    </linearGradient>
    <linearGradient id="paper" x1="91" y1="48" x2="178" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e8eef7"/>
    </linearGradient>
    <linearGradient id="accent" x1="104" y1="77" x2="200" y2="197" gradientUnits="userSpaceOnUse">
      <stop stop-color="#51c878"/>
      <stop offset="1" stop-color="#12975b"/>
    </linearGradient>
    <filter id="shadow" x="12" y="10" width="232" height="232" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="13" flood-color="#102033" flood-opacity=".22"/>
    </filter>
  </defs>
  <rect width="256" height="256" rx="58" fill="#f7f9fc"/>
  <g filter="url(#shadow)">
    <rect x="24" y="24" width="208" height="208" rx="58" fill="url(#tile)"/>
    <rect x="43" y="43" width="170" height="170" rx="44" fill="none" stroke="#fff" stroke-opacity=".16" stroke-width="5"/>
    <path d="M76 64h79l31 31v82H76z" fill="#dce8f5" opacity=".72"/>
